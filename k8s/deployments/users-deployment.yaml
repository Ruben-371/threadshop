apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: threadshop
  labels:
    app: users-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
      - name: users-service
        image: registry.digitalocean.com/YOUR_REGISTRY/users-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: threadshop-secrets
              key: users-db-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: threadshop-secrets
              key: jwt-secret
        - name: PORT
          value: "3001"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
