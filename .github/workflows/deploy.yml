name: ThreadShop CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}

jobs:
  # ──────────────────────────────────────────
  # BUILD & PUSH all Docker images
  # ──────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [users-service, catalog-service, payments-service, frontend]
        include:
          - service: users-service
            path: services/users-service
          - service: catalog-service
            path: services/catalog-service
          - service: payments-service
            path: services/payments-service
          - service: frontend
            path: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            ./${{ matrix.path }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:latest

  # ──────────────────────────────────────────
  # DEPLOY to DOKS with Helm
  # ──────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Save DOKS kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DO_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Deploy with Helm
        run: |
          helm upgrade --install threadshop ./helm/threadshop \
            --namespace threadshop \
            --create-namespace \
            --set global.imageTag=${{ github.sha }} \
            --set global.registry=${{ env.REGISTRY }} \
            --set secrets.usersDbUrl="${{ secrets.USERS_DB_URL }}" \
            --set secrets.paymentsDbUrl="${{ secrets.PAYMENTS_DB_URL }}" \
            --set secrets.mongoUri="${{ secrets.MONGO_URI }}" \
            --set secrets.jwtSecret="${{ secrets.JWT_SECRET }}" \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/users-service -n threadshop
          kubectl rollout status deployment/catalog-service -n threadshop
          kubectl rollout status deployment/payments-service -n threadshop
          echo "✅ All services deployed successfully!"
